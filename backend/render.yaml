services:
  - type: web
    name: real-estate-agent-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: real-estate-agent-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_PRIVATE_KEY_PATH
        value: /etc/secrets/jwt_private.pem
      - key: JWT_PUBLIC_KEY_PATH
        value: /etc/secrets/jwt_public.pem
      - key: LLM_MODEL_ID
        value: blissful_ishizaka_626/gemma4-cloud
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: real-estate-agent
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

databases:
  - name: real-estate-agent-db
    databaseName: realestateagent
    user: rea_user
    plan: standard
