name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  push:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/pyproject.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
  workflow_dispatch:

jobs:
  trivy-backend:
    name: Scan Backend Image
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t backend-scan:latest ./backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend-scan:latest
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  trivy-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build -t frontend-scan:latest ./frontend \
            --build-arg NEXT_PUBLIC_API_URL=http://placeholder

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend-scan:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  trivy-filesystem:
    name: Scan Repository Filesystem
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem
