name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rea_user
          POSTGRES_PASSWORD: rea_password
          POSTGRES_DB: realestateagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://rea_user:rea_password@localhost:5432/realestateagent
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      SECRET_KEY: ci-test-secret-key-32-chars-minimum!!
      JWT_PRIVATE_KEY_PATH: ./secrets/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: ./secrets/jwt_public.pem
      LLM_MODEL_ID: blissful_ishizaka_626/gemma4-cloud
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: real-estate-agent-ci
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install --upgrade uv

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Generate test JWT keys
        run: |
          mkdir -p secrets
          openssl genrsa -out secrets/jwt_private.pem 2048
          openssl rsa -in secrets/jwt_private.pem -pubout -out secrets/jwt_public.pem

      - name: Lint with ruff
        run: uv run ruff check app/

      - name: Type check with mypy
        run: uv run mypy app/ --ignore-missing-imports

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -x --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.BACKEND_URL }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Deploy hook failed with HTTP $response"
            exit 1
          fi
          echo "Deploy triggered (HTTP $response)"

      - name: Wait for deploy
        run: |
          echo "Waiting 60s for Render to pick up the deploy..."
          sleep 60

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.BACKEND_URL }}/api/v1/health")
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: got HTTP $status, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1
